<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>后台管理</title>

<style>
body{
    margin:0;
    font-family:sans-serif;
    background:#f5f5f5;
}

/* 登录 */
.box{
    max-width:360px;
    margin:120px auto;
    background:#fff;
    padding:20px;
    border-radius:12px;
}

/* 主体 */
.container{
    max-width:900px;
    margin:40px auto;
    background:#fff;
    padding:20px;
    border-radius:12px;
}

/* item */
.item{
    padding:14px 0;
    border-bottom:1px solid #eee;
}

/* 标题行 */
.top{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

/* 状态 */
.tag{
    font-size:12px;
    padding:2px 8px;
    border-radius:6px;
}

.pending{ background:#ffe5e5; color:#c00; }
.done{ background:#e7ffe7; color:#1a7f1a; }

/* 时间 */
.time{
    font-size:12px;
    color:#888;
    margin-top:4px;
}

/* 按钮 */
button{
    margin-right:6px;
    font-size:12px;
}
mark{
    background:yellow;
}
</style>
</head>

<body>

<!-- 登录 -->
<div class="box" id="loginBox">
    <h2>后台登录</h2>
    <input type="password" id="pwd" placeholder="请输入密码">
    <button onclick="login()">登录</button>
    <p id="msg"></p>
</div>

<!-- 后台 -->
<div class="container" id="adminPanel" style="display:none;">
    <h2>内容管理</h2>

    <input id="searchInput" placeholder="搜索..." oninput="loadData()">

    <div id="list"></div>
</div>

<script>

async function login(){

    const res = await fetch("/api/admin-login", {
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify({
            password: document.getElementById("pwd").value
        })
    });

    const json = await res.json();

    if(json.success){
        localStorage.setItem("admin_token", json.token);
        document.getElementById("loginBox").style.display="none";
        document.getElementById("adminPanel").style.display="block";
        loadData();
    }else{
        document.getElementById("msg").innerText="密码错误";
    }
}

async function loadData(){

    const token = localStorage.getItem("admin_token");
    const q = document.getElementById("searchInput").value;

    const res = await fetch("/api/list?q="+encodeURIComponent(q), {
        headers:{ "Authorization": token }
    });

    const json = await res.json();

    const list = document.getElementById("list");
    list.innerHTML = "";

    json.data.forEach(item => {

        const statusClass = item.status === "done" ? "done" : "pending";
        const statusText = item.status === "done" ? "已处理" : "待处理";

        let text = item.question;

        if(q){
            text = text.replace(
                new RegExp(q,"gi"),
                m => `<mark>${m}</mark>`
            );
        }

        const div = document.createElement("div");
        div.className = "item";

        div.innerHTML = `
            <div class="top">
                <b>${text}</b>
                <span class="tag ${statusClass}">${statusText}</span>
            </div>

            <div class="time">${item.created_at}</div>

            <div>
                <button onclick="toggle(${item.id},'${item.status}')">切换状态</button>
                <button onclick="del(${item.id})">删除</button>
            </div>
        `;

        list.appendChild(div);
    });
}

async function toggle(id,status){

    const newStatus = status==="done"?"pending":"done";

    await fetch("/api/status",{
        method:"POST",
        headers:{
            "Content-Type":"application/json",
            "Authorization":localStorage.getItem("admin_token")
        },
        body:JSON.stringify({id,status:newStatus})
    });

    loadData();
}

async function del(id){

    await fetch("/api/delete",{
        method:"POST",
        headers:{
            "Content-Type":"application/json",
            "Authorization":localStorage.getItem("admin_token")
        },
        body:JSON.stringify({id})
    });

    loadData();
}

window.onload=()=>{
    if(localStorage.getItem("admin_token")){
        document.getElementById("loginBox").style.display="none";
        document.getElementById("adminPanel").style.display="block";
        loadData();
    }
};

</script>

</body>
</html>
