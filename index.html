<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>点图箱</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <h1>点图箱</h1>

    <p class="description">
        描述你想看的内容、角色或场景，我们会在合适的时候参考。
    </p>

    <form id="requestForm">

        <label>内容描述 *</label>

        <textarea id="request" rows="8" maxlength="2000"
        placeholder="尽量具体，比如：角色 + 场景 + 情绪"></textarea>

        <button type="submit" id="submitBtn">提交</button>

        <p id="msg" class="msg"></p>

    </form>

</div>

<script src="script.js"></script>

</body>
</html>
