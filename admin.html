<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>后台 - 点图箱</title>

<style>
body{
    font-family: sans-serif;
    background:#f5f5f5;
    margin:0;
}

.container{
    max-width:800px;
    margin:40px auto;
    background:white;
    padding:20px;
    border-radius:10px;
}

.item{
    border-bottom:1px solid #eee;
    padding:15px 0;
}

.time{
    color:#999;
    font-size:12px;
}
</style>
</head>

<body>

<div class="container">
    <h2>后台管理</h2>
    <div id="list">加载中...</div>
</div>

<script>
async function loadData(){
    const res = await fetch("/api/list");
    const json = await res.json();

    const container = document.getElementById("list");
    container.innerHTML = "";

    json.data.forEach(item => {
        const div = document.createElement("div");
        div.className = "item";

        div.innerHTML = `
            <div>${item.question}</div>
            <div class="time">${item.created_at}</div>
        `;

        container.appendChild(div);
    });
}

loadData();
</script>

</body>
</html>
