<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>点图箱</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <h1>点图箱</h1>

    <p class="description">
        如果你有想看的主题、角色、构图或灵感，请在这里描述。<br>
        我会根据兴趣和时间决定是否绘制。
    </p>

    <form id="requestForm">

        <label>想看的内容 <span>*</span></label>

        <textarea
            id="request"
            rows="10"
            maxlength="2000"
            placeholder="例如：

作品：
角色：

想看的场景：

人物状态：

构图：

其它补充：
"
            required
        ></textarea>

        <button type="submit">提交点图</button>

    </form>

</div>

<script src="script.js"></script>

</body>
</html>
